<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error Log</title>
  <link rel="stylesheet" href="skeleton.css">
  <style>
    body { padding: 20px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #ddd; }
    th { background: #f5f5f5; position: sticky; top: 0; }
    td.msg { max-width: 400px; word-break: break-word; }
    td.stack { max-width: 300px; white-space: pre-wrap; word-break: break-word; font-size: 11px; color: #666; }
    td.ua { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .empty { color: #999; padding: 40px; text-align: center; }
  </style>
</head>
<body>
  <h4>Error Log</h4>
  <div id="content"><p class="empty">Loading...</p></div>

  <script>
    (async () => {
      const res = await fetch('/api/errors');
      const data = await res.json();
      const el = document.getElementById('content');

      if (!data.errors || data.errors.length === 0) {
        el.innerHTML = '<p class="empty">No errors logged yet.</p>';
        return;
      }

      const rows = data.errors.map(e => `
        <tr>
          <td>${new Date(e.created_at).toLocaleString()}</td>
          <td class="msg">${esc(e.message)}</td>
          <td>${esc(e.source || '')}${e.lineno ? ':' + e.lineno : ''}${e.colno ? ':' + e.colno : ''}</td>
          <td class="stack">${esc(e.stack || '')}</td>
          <td>${e.userId ? esc('...' + e.userId.slice(-8)) + ' — ' + esc(e.player_name || 'Pending') : ''}</td>
          <td class="ua" title="${esc(e.userAgent || '')}">${esc(e.userAgent || '')}</td>
        </tr>
      `).join('');

      el.innerHTML = `
        <p>${data.count} error(s)</p>
        <table>
          <thead><tr>
            <th>Time</th><th>Message</th><th>Source</th><th>Stack</th><th>User</th><th>UA</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    })();

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
  </script>
</body>
</html>
